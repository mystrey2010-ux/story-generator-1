<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with LLM Models</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .controls select, .controls input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            flex: 1;
        }
        textarea, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        textarea {
            height: 100px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .section {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .prompt {
            background-color: #e3f2fd;
            border-left: 4px solid #2196F3;
        }
        .analysis {
            background-color: #fff3e0;
            border-left: 4px solid #ff9800;
        }
        .output {
            background-color: #e8f5e9;
            border-left: 4px solid #4CAF50;
        }
        .error {
            background-color: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chat with LLM Models</h1>
        
        <div class="controls">
            <select id="model-select">
                {% for model in models %}
                <option value="{{ model }}">{{ model }}</option>
                {% endfor %}
            </select>
            <input type="number" id="word-count" placeholder="Target Word Count (optional)" min="1">
        </div>
        
        <textarea id="prompt" placeholder="Enter your prompt here..."></textarea>
        <button onclick="sendPrompt()">Send to LMStudio</button>
        
        <div class="loading" id="loading">Processing...</div>
        
        <div id="prompt-section" class="section prompt" style="display: none;">
            <h2>Your Prompt:</h2>
            <p id="original-prompt"></p>
        </div>
        
        <div id="analysis-section" class="section analysis" style="display: none;">
            <h2>Analysis / Thinking Process:</h2>
            <pre id="analysis-content" style="white-space: pre-wrap; word-wrap: break-word;"></pre>
        </div>
        
        <div id="output-section" class="section output" style="display: none;">
            <h2>Final Output:</h2>
            <pre id="final-output" style="white-space: pre-wrap; word-wrap: break-word;"></pre>
        </div>
    </div>

    <script>
        async function sendPrompt() {
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model-select').value;
            const wordCount = document.getElementById('word-count').value;
            const loading = document.getElementById('loading');
            
            if (!prompt) {
                alert('Please enter a prompt');
                return;
            }
            
            loading.style.display = 'block';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: prompt,
                        model: model,
                        word_count: wordCount
                    })
                });
                
                const data = await response.json();
                loading.style.display = 'none';
                
                if (response.ok) {
                    // Show prompt section
                    document.getElementById('original-prompt').textContent = data.original_prompt;
                    document.getElementById('prompt-section').style.display = 'block';
                    
                    // Show analysis section
                    document.getElementById('analysis-content').textContent = data.analysis;
                    document.getElementById('analysis-section').style.display = 'block';
                    
                    // Show final output section
                    document.getElementById('final-output').textContent = data.final_output;
                    document.getElementById('output-section').style.display = 'block';
                } else {
                    document.getElementById('output-section').style.display = 'block';
                    document.getElementById('output-section').className = 'section error';
                    document.getElementById('final-output').textContent = 'Error: ' + data.error;
                }
            } catch (error) {
                loading.style.display = 'none';
                document.getElementById('output-section').style.display = 'block';
                document.getElementById('output-section').className = 'section error';
                document.getElementById('final-output').textContent = 'Error: Failed to connect to LMStudio';
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
            }
        });
    </script>
</body>
</html>
