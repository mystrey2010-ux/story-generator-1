<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .controls select, .controls input, .controls button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            flex: 1;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            height: 100px;
        }
        button.send-btn {
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            width: auto;
            flex: 1;
        }
        button.clear-btn {
            background-color: #f44336;
            color: white;
            font-size: 16px;
            cursor: pointer;
            width: auto;
        }
        .chat-container {
            margin-top: 20px;
        }
        .chat-entry {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
        }
        .chat-entry.user {
            border-left: 4px solid #2196F3;
        }
        .chat-entry.assistant {
            border-left: 4px solid #4CAF50;
        }
        .section-header {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .prompt-text {
            background-color: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
        }
        .analysis-text {
            background-color: #fff3e0;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .output-text {
            background-color: #e8f5e9;
            padding: 10px;
            border-radius: 5px;
            margin: 5px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .word-count-info {
            background-color: #f3e5f5;
            padding: 8px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
            color: #7b1fa2;
        }
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: #666;
        }
        .error-text {
            background-color: #ffebee;
            padding: 10px;
            border-radius: 5px;
            color: #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LLM Chat Interface</h1>
        
        <div class="controls">
            <select id="model-select">
                {% for model in models %}
                <option value="{{ model }}">{{ model }}</option>
                {% endfor %}
            </select>
            <input type="number" id="word-count" placeholder="Target Word Count (optional)" min="1">
            <button class="clear-btn" onclick="newChat()">NEW Chat</button>
        </div>
        
        <textarea id="prompt" placeholder="Enter your prompt here..."></textarea>
        <button class="send-btn" onclick="sendPrompt()">Send to LMStudio</button>
        
        <div class="loading" id="loading">Processing...</div>
        
        <div class="chat-container" id="chat-container">
            {% for entry in chat_history %}
            <div class="chat-entry user">
                <div class="section-header">Your Prompt:</div>
                <div class="prompt-text">{{ entry.prompt | e }}</div>
            </div>
            {% if entry.response %}
            <div class="chat-entry assistant">
                <div class="section-header">Final Output:</div>
                <pre class="output-text" style="white-space: pre-wrap; word-wrap: break-word;">{{ entry.response | e }}</pre>
                <div class="word-count-info">Word Count: {{ entry.actual_word_count | int | default(0) | intcomma }}</div>
            </div>
            {% endif %}
            {% endfor %}
        </div>
    </div>

    <script>
        async function sendPrompt() {
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model-select').value;
            const wordCount = document.getElementById('word-count').value;
            const loading = document.getElementById('loading');
            
            if (!prompt) {
                alert('Please enter a prompt');
                return;
            }
            
            loading.style.display = 'block';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: prompt,
                        model: model,
                        word_count: wordCount
                    })
                });
                
                const data = await response.json();
                loading.style.display = 'none';
                
                if (response.ok) {
                    // Clear input
                    document.getElementById('prompt').value = '';
                    
                    // Append to chat
                    appendToChat(prompt, data.final_output, data.actual_word_count);
                } else {
                    appendError('Error: ' + data.error);
                }
            } catch (error) {
                loading.style.display = 'none';
                appendError('Error: Failed to connect to LMStudio');
            }
        }
        
        function appendToChat(prompt, output, wordCount) {
            const container = document.getElementById('chat-container');
            
            // Add user prompt
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-entry user';
            userDiv.innerHTML = `
                <div class="section-header">Your Prompt:</div>
                <div class="prompt-text">${escapeHtml(prompt)}</div>
            `;
            container.appendChild(userDiv);
            
            // Add assistant response
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'chat-entry assistant';
            assistantDiv.innerHTML = `
                <div class="section-header">Final Output:</div>
                <pre class="output-text" style="white-space: pre-wrap; word-wrap: break-word;">${escapeHtml(output)}</pre>
                <div class="word-count-info">Word Count: ${wordCount.toLocaleString()}</div>
            `;
            container.appendChild(assistantDiv);
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }
        
        function appendError(message) {
            const container = document.getElementById('chat-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'chat-entry';
            errorDiv.innerHTML = `<div class="error-text">${escapeHtml(message)}</div>`;
            container.appendChild(errorDiv);
        }
        
        async function newChat() {
            try {
                await fetch('/clear', {method: 'POST'});
                document.getElementById('chat-container').innerHTML = '';
                document.getElementById('word-count').value = '';
            } catch (e) {
                // Clear UI anyway
                document.getElementById('chat-container').innerHTML = '';
                document.getElementById('word-count').value = '';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Allow Enter key to submit
        document.getElementById('prompt').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
            }
        });
    </script>
</body>
</html>
