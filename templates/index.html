<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0f4f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 16px 0;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            align-items: center;
        }
        
        .controls select, .controls input {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 14px;
            background: white;
        }
        
        .controls input {
            width: 240px;
            text-align: center;
        }
        
        .controls select {
            flex: 1;
            max-width: 400px;
        }
        
        .clear-btn {
            padding: 10px 20px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .clear-btn:hover {
            background: #e2e8f0;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .chat-entry {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .chat-entry.user {
            align-items: flex-end;
        }
        
        .chat-entry.assistant {
            align-items: flex-start;
        }
        
        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .chat-entry.user .message-bubble {
            background: #0ea5e9;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .chat-entry.assistant .message-bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        
        .message-label {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
            padding: 0 4px;
        }
        
        .input-area {
            background: white;
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            border: 1px solid #cbd5e1;
            margin-top: 20px;
        }
        
        .input-area textarea {
            flex: 1;
            border: none;
            resize: none;
            font-size: 15px;
            padding: 10px;
            outline: none;
            font-family: inherit;
            min-height: 24px;
            max-height: 120px;
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #0ea5e9;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .send-btn:hover {
            background: #0284c7;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .loading-dots {
            display: flex;
            gap: 3px;
        }
        
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #64748b;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        
        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
            30% { opacity: 1; transform: scale(1.1); }
        }
        
        .word-count {
            font-size: 11px;
            color: #94a3b8;
            padding: 4px 8px;
            margin-top: 4px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            
            .message-bubble {
                max-width: 95%;
            }
            
            .controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LLM Chat</h1>
        </header>
        
        <div class="controls">
            <select id="model-select">
                {% for model in models %}
                <option value="{{ model }}">{{ model }}</option>
                {% endfor %}
            </select>
            <input type="number" id="word-count" placeholder="Target words" min="1">
            <button class="clear-btn" onclick="newChat()">New Chat</button>
        </div>
        
        <div class="chat-container" id="chat-container">
            {% for entry in chat_history %}
            <div class="chat-entry user">
                <div class="message-label">You</div>
                <div class="message-bubble">{{ entry.prompt | e }}</div>
            </div>
            {% if entry.response %}
            <div class="chat-entry assistant">
                <div class="message-label">Assistant</div>
                <div class="message-bubble">{{ entry.response | e }}</div>
            </div>
            {% endif %}
            {% endfor %}
        </div>
        
        <div class="loading" id="loading" style="display: none;">
            <span>Thinking</span>
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <div class="input-area">
            <textarea id="prompt" placeholder="Type your message here..." rows="1"></textarea>
            <button class="send-btn" onclick="sendPrompt()">→</button>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('prompt');
        
        // Auto-resize textarea
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        async function sendPrompt() {
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model-select').value;
            const wordCount = document.getElementById('word-count').value;
            const loading = document.getElementById('loading');
            
            if (!prompt.trim()) return;
            
            loading.style.display = 'block';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: prompt,
                        model: model,
                        word_count: wordCount
                    })
                });
                
                const data = await response.json();
                loading.style.display = 'none';
                
                if (response.ok) {
                    textarea.value = '';
                    textarea.style.height = 'auto';
                    appendToChat(prompt, data.final_output, data.actual_word_count);
                } else {
                    appendError('Error: ' + data.error);
                }
            } catch (error) {
                loading.style.display = 'none';
                appendError('Error: Failed to connect to LMStudio');
            }
        }
        
        function appendToChat(prompt, output, wordCount) {
            const container = document.getElementById('chat-container');
            
            // Add user prompt
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-entry user';
            userDiv.innerHTML = `
                <div class="message-label">You</div>
                <div class="message-bubble">${escapeHtml(prompt)}</div>
            `;
            container.appendChild(userDiv);
            
            // Add assistant response
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'chat-entry assistant';
            assistantDiv.innerHTML = `
                <div class="message-label">Assistant</div>
                <div class="message-bubble">${escapeHtml(output)}</div>
                <div class="word-count">${wordCount.toLocaleString()} words</div>
            `;
            container.appendChild(assistantDiv);
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }
        
        function appendError(message) {
            const container = document.getElementById('chat-container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'chat-entry assistant';
            errorDiv.innerHTML = `
                <div class="message-label">System</div>
                <div class="message-bubble" style="color: #dc2626; border: 1px solid #fecaca; background: #fef2f2;">${escapeHtml(message)}</div>
            `;
            container.appendChild(errorDiv);
        }
        
        async function newChat() {
            try {
                await fetch('/clear', {method: 'POST'});
            } catch (e) {
                // Continue to clear UI
            }
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('prompt').value = '';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Submit on Enter (not Shift+Enter)
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendPrompt();
            }
        });
    </script>
</body>
</html>
